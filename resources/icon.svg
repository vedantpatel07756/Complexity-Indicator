<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">

  <!-- Outer C arc with ) connector at top, as one continuous path -->
  <!-- Starts at outer arc bottom, sweeps counterclockwise to top,
       then ) curves clockwise down to inner arc top -->
  <path
    d="M 67.2 74.6
       A 30 30 0 1 1 67.2 25.4
       A 7 7 0 0 1 60.3 35.3"
    stroke="white" stroke-width="6"
    stroke-linecap="round" stroke-linejoin="round" fill="none"
  />

  <!-- Inner C arc: inner arc top → counterclockwise → inner arc bottom -->
  <path
    d="M 60.3 35.3 A 18 18 0 1 0 60.3 64.7"
    stroke="white" stroke-width="6"
    stroke-linecap="round" fill="none"
  />

  <!-- Ring (outlined, not solid) at tip of inner arc -->
  <circle cx="66" cy="68" r="6" stroke="white" stroke-width="6" fill="none"/>

</svg>
