<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h2>Complexity Indicator</h2>

  <div class="card">
    <div class="label">ACTIVE EDITOR</div>
    <div class="file">plan_check.dart</div>
  </div>

  <div class="row">
    <div class="card">
      <div class="label">LOC</div>
      <div class="value">245</div>
    </div>

    <div class="card">
      <div class="label">Imports</div>
      <div class="value">12</div>
    </div>
  </div>

  <div class="card">
    <div class="label">Complexity Score</div>
    <div class="score">48 / 100</div>
    <div class="badge">MEDIUM</div>
    <div class="progress">
      <div class="progress-bar" style="width:48%"></div>
    </div>
  </div>

</body>
</html>
